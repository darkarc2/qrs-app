name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.7.1'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install web app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run generate

      - name: Verify static output
        run: |
          test -f .output/public/index.html && echo "Static build OK" || (echo "ERROR: index.html missing" && exit 1)

      - name: Install Capacitor
        run: |
          pnpm add -w --save-exact \
            @capacitor/cli@6.2.0 \
            @capacitor/core@6.2.0 \
            @capacitor/android@6.2.0

      - name: Create Capacitor config
        run: |
          node -e "
          const fs = require('fs');
          const config = {
            appId: 'dev.qifi.qrs',
            appName: 'QRS',
            webDir: '.output/public',
            server: { androidScheme: 'https', cleartext: true },
            android: { allowMixedContent: true }
          };
          fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
          console.log('capacitor.config.json written');
          "

      - name: Add Android platform
        run: pnpm exec cap add android

      - name: Sync web assets to Android
        run: pnpm exec cap sync android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install required Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate and rename APK
        run: |
          APK=$(find android -name "app-debug.apk" -type f | head -1)
          echo "Found APK: $APK"
          cp "$APK" QRS-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRS-Android-APK
          path: QRS-android-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release (Android)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: QRS-android-debug.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

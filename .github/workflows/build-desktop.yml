name: Build Windows Desktop App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-nuxt:
    name: Build Nuxt Static Site (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.7.1'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run generate

      - name: Verify output exists
        run: |
          if [ ! -f ".output/public/index.html" ]; then
            echo "ERROR: .output/public/index.html not found!"
            ls -la .output/ || echo ".output directory missing"
            exit 1
          fi
          echo "Static build OK, files:"
          ls -la .output/public/

      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-static
          path: .output/public/
          if-no-files-found: error

  package-windows:
    name: Package Windows EXE
    runs-on: windows-latest
    needs: build-nuxt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: nuxt-static
          path: desktop/www

      - name: Verify www files
        shell: pwsh
        run: |
          if (-not (Test-Path "desktop\www\index.html")) {
            Write-Error "desktop\www\index.html not found!"
            exit 1
          }
          Write-Host "www files OK:"
          Get-ChildItem desktop\www | Select-Object Name

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows portable EXE
        working-directory: desktop
        run: npm run build:win -- --publish never

      - name: List output files
        shell: pwsh
        run: Get-ChildItem -Recurse desktop\dist | Where-Object { !$_.PSIsContainer }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QRS-Windows-Portable
          path: desktop/dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
